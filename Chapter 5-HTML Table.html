<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 5 : HTML Table</title>
</head>
<body>
  <style>
    body {
      background-color: cornflowerblue;
    }
  </style>
  <table border="1">
    <tr>
      <th>Full Name</th>
      <th>Age</th>
      <th>Major</th>
    </tr>

    <tr>
      <td>Wuttiphat</td>
      <td>20</td>
      <td>IT</td>
    </tr>

    <tr>
      <td>John</td>
      <td>21</td>
      <td>CS</td>
    </tr>
    
    <tr>
      <td>Alice</td>
      <td>19</td>
      <td>SE</td>
    </tr>
</table>
</body>
</html>


<table> = โต๊ะทั้งตัว

<tr> = 1 แถว (Row)
<th> = หัวตาราง (Header)
<td> = ข้อมูล (Data)
