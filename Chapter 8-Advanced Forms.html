<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 8 : Advanced Forms</title>
</head>
<body>
  <style>
    body {
      background-color: burlywood;
    }
    form {
      color: rgb(0, 0, 0);
    }
  </style>
  <form>
    <label>Full Name</label><br>
    <input type="text"><br>
    <label>Email</label><br>
    <input type="email" placeholder="@email.com"><br>
    <label>Password</label><br>
    <input type="password"><br>
    <p>Gender</p>
    <input type="radio" name="Gender"> Male<br>
    <input type="radio"name="Gender"> Female<br>
    <input type="radio" name="Gender"> Gay<br>

    <p>Programming Languages</p>
    <input type="checkbox">HTML<br>
    <input type="checkbox">CSS<br>
    <input type="checkbox">JavaScript<br>

    <p>Major</p>
      <select>
        <option>Information Technology</option>
        <option>Computer Science</option>
        <option>Software Engineering</option>
      </select>

      <p>About Me</p>
      <textarea rows="3" cols="15"></textarea>

      <p>Profile Picture</p>
      <input type="file">

      <div>
        <button>Register</button><br>
      </div>
      
  </form>
</body>
</html>
